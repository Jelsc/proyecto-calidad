services:
  db:
    image: postgres:16-alpine
    container_name: cybershield-db
    environment:
      POSTGRES_DB: ${DB_NAME:-cybershield}
      POSTGRES_USER: ${DB_USER:-cybershield}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cybershield}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cybershield} -d ${DB_NAME:-cybershield}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./Backend
    container_name: cybershield-backend
    command: >
      sh -c "python manage.py migrate --noinput && python manage.py bootstrap_demo_user && gunicorn cybershield.wsgi:application --bind 0.0.0.0:8000 --reload"
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./Backend:/app
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./Frontend
    container_name: cybershield-frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"

  nginx:
    image: nginx:1.27-alpine
    container_name: cybershield-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  frontend_node_modules:
