resolver 127.0.0.11 ipv6=off valid=10s;

upstream cybershield_backend {
    zone cybershield_backend 64k;
    server backend:8000 resolve;
}

upstream cybershield_frontend {
    zone cybershield_frontend 64k;
    server frontend:5173 resolve;
}

# HTTP — redirect to HTTPS + Certbot acme-challenge
server {
    listen 80;
    server_name app-calidad.duckdns.org api-calidad.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Frontend (app-calidad.duckdns.org)
server {
    listen 443 ssl;
    server_name app-calidad.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/app-calidad.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-calidad.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://cybershield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://cybershield_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS — API (api-calidad.duckdns.org)
server {
    listen 443 ssl;
    server_name api-calidad.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/app-calidad.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-calidad.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    location / {
        proxy_pass http://cybershield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
